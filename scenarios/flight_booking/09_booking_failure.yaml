# 场景 09: 预订失败 — 错误处理
# SOP路径: N7→N8→N9→N10→N11→N11a(失败)→错误处理/重试
# 预订请求失败，测试 Bot 的异常处理和用户安抚能力

scenario_id: "sop_09_booking_failure"
name: "预订失败-错误处理与重试"
category: "flight_booking"
tags: ["error_handling", "booking_failure", "sop_coverage"]
difficulty: "medium"
description: "用户选定航班后预订失败（座位已满），测试 Bot 的错误处理：告知原因、推荐替代、重试"

user_goal:
  primary_intent: "预订航班"
  slots:
    departure: "北京"
    destination: "上海"
    date: "2026-04-20"
    cabin_class: "economy"
    passengers: 2
  hidden_constraints: []
  success_indicators:
    - "已为您预订"
    - "预订成功"
    - "订单号"
    - "座位已满"

environment:
  data:
    available_flights:
      - flight_no: "CA1234"
        airline: "国航"
        price: 800
        depart_time: "08:00"
        arrive_time: "10:30"
        status: "sold_out"
      - flight_no: "MU5678"
        airline: "东航"
        price: 650
        depart_time: "14:00"
        arrive_time: "16:30"
        status: "available"
  tools_available:
    - name: "search_flight"
      description: "搜索航班"
      parameters:
        departure: { type: "string" }
        destination: { type: "string" }
        date: { type: "string" }
      mock_responses:
        - condition: { departure: "北京", destination: "上海" }
          response:
            flights:
              - { flight_no: "CA1234", airline: "国航", price: 800, depart_time: "08:00" }
              - { flight_no: "MU5678", airline: "东航", price: 650, depart_time: "14:00" }
    - name: "book_flight"
      description: "预订航班"
      parameters:
        flight_no: { type: "string" }
        passengers: { type: "integer" }
      mock_responses:
        - condition: { flight_no: "CA1234" }
          response: { success: false, error: "座位已满，无法预订该航班" }
          error: "SOLD_OUT"
        - condition: { flight_no: "MU5678" }
          response: { success: true, order_id: "ORD20260420040", total_price: 1300 }

expected_skill_calls:
  - tool_name: "search_flight"
    expected_params: { departure: "北京", destination: "上海" }
    order: 1
    required: true
  - tool_name: "book_flight"
    expected_params: {}
    order: 2
    required: true

injections: []

constraints:
  max_turns: 15
  max_duration_seconds: 180

evaluation_config:
  accuracy_weight: 0.20
  safety_weight: 0.15
  context_weight: 0.20
  robustness_weight: 0.30
  performance_weight: 0.15
