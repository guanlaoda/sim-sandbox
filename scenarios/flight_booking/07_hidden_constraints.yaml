# 场景 07: 隐含约束筛选
# SOP路径: N7→N8→I5(用户提出约束)→N9(筛选推荐)→N10→N11→N12
# 用户有预算、时间、航司偏好等隐含约束，Bot 需识别并筛选

scenario_id: "sop_07_hidden_constraints"
name: "隐含约束-预算时间偏好"
category: "flight_booking"
tags: ["hidden_constraints", "filtering", "sop_coverage"]
difficulty: "medium"
description: "用户有多个隐含约束（预算≤1000、不坐红眼航班、偏好大航司），测试 Bot 推荐筛选能力"

user_goal:
  primary_intent: "预订航班"
  slots:
    departure: "北京"
    destination: "上海"
    date: "2026-04-15"
    cabin_class: "economy"
    passengers: 2
  hidden_constraints:
    - "预算不超过1000元/人"
    - "不坐晚上10点之后的航班（红眼航班）"
    - "偏好国航或东航等大航空公司"
  success_indicators:
    - "已为您预订"
    - "预订成功"
    - "订单号"

environment:
  data:
    available_flights:
      - flight_no: "CA1234"
        airline: "国航"
        price: 800
        depart_time: "08:00"
        arrive_time: "10:30"
      - flight_no: "MU5678"
        airline: "东航"
        price: 650
        depart_time: "14:00"
        arrive_time: "16:30"
      - flight_no: "9C8899"
        airline: "春秋航空"
        price: 350
        depart_time: "22:30"
        arrive_time: "01:00"
      - flight_no: "CA5566"
        airline: "国航"
        price: 2500
        depart_time: "10:00"
        arrive_time: "12:30"
  tools_available:
    - name: "search_flight"
      description: "搜索航班"
      parameters:
        departure: { type: "string" }
        destination: { type: "string" }
        date: { type: "string" }
      mock_responses:
        - condition: { departure: "北京", destination: "上海" }
          response:
            flights:
              - { flight_no: "CA1234", airline: "国航", price: 800, depart_time: "08:00" }
              - { flight_no: "MU5678", airline: "东航", price: 650, depart_time: "14:00" }
              - { flight_no: "9C8899", airline: "春秋航空", price: 350, depart_time: "22:30" }
              - { flight_no: "CA5566", airline: "国航", price: 2500, depart_time: "10:00" }
    - name: "book_flight"
      description: "预订航班"
      parameters:
        flight_no: { type: "string" }
        passengers: { type: "integer" }
      mock_responses:
        - condition: { flight_no: "CA1234" }
          response: { success: true, order_id: "ORD20260415020", total_price: 1600 }
        - condition: { flight_no: "MU5678" }
          response: { success: true, order_id: "ORD20260415021", total_price: 1300 }

expected_skill_calls:
  - tool_name: "search_flight"
    expected_params: { departure: "北京", destination: "上海" }
    order: 1
    required: true
  - tool_name: "book_flight"
    expected_params: {}
    order: 2
    required: true

injections: []

constraints:
  max_turns: 15
  max_duration_seconds: 180

evaluation_config:
  accuracy_weight: 0.30
  safety_weight: 0.15
  context_weight: 0.25
  robustness_weight: 0.15
  performance_weight: 0.15
  custom_checks:
    - name: "hidden_constraint_respected"
      description: "预订的航班是否满足所有隐含约束（预算、时间、航司）"
      check_type: "llm_judge"
